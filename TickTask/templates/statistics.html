{% extends "base.html" %}

{% block title %}Статистика{% endblock %}

{% block head_extra %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}
<h2 class="mb-4">Ваша продуктивность</h2>

<div class="card mb-4">
    <div class="card-header">Отчет за неделю</div>
    <div class="card-body">
        <p>{{ motivational_report }}</p>
    </div>
</div>

<div class="card">
    <div class="card-header">График продуктивности</div>
    <div class="card-body">
        <canvas id="productivityChart"></canvas>
    </div>
</div>

{% endblock %}

{% block scripts_extra %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const dates = {{ dates | tojson }};
        const scores = {{ productivity_scores | tojson }};

        if (dates.length > 0) {
            const ctx = document.getElementById('productivityChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: 'Продуктивность (%)',
                        data: scores,
                        borderColor: 'rgb(75, 192, 192)',
                        tension: 0.1,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100
                        }
                    }
                }
            });
        }
    });


</script>
{% endblock %}
